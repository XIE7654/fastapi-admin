# Alembic 配置文件

[alembic]
# 迁移脚本目录
script_location = migrations

# 版本文件模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 时区
timezone = Asia/Shanghai

# 截断长标识符
truncate_slug_length = 40

# 版本目录
version_locations = migrations/versions

# 版本文件命名
version_path_separator = os

# 输出编码
output_encoding = utf-8

# 数据库URL（由env.py动态设置）
# sqlalchemy.url = mysql+pymysql://root:password@localhost/ruoyi-vue-pro

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S